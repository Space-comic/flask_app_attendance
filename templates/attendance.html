{% extends "base.html" %}
{% block title %}考勤签到{% endblock %}
{% block content %}
<h2 class="font-bold mb-2">考勤签到</h2>
<div class="grid-2">
    <div class="card">
        <div class="attendance-head">
            <div>
                <h3 class="font-bold mb-1">实时取景</h3>
            </div>
            <span class="badge bg-primary">活体 + 人脸识别</span>
        </div>

        <div class="video-shell">
            <video id="video" autoplay muted playsinline></video>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>

        <div id="liveness-status" class="liveness-status status-info mt-2">
            点击“开始活体验证”后，请按提示完成张嘴和头部移动动作。
        </div>

        <div class="attendance-progress">
            <span class="text-sm text-muted">张嘴进度</span>
            <span id="mouth-count" class="font-bold">0 / 1</span>
        </div>

        <div class="attendance-actions">
            <button id="btn-start-liveness" class="btn btn-primary">开始活体验证</button>
            <button id="btn-capture-checkin" class="btn btn-success" disabled>拍照签到</button>
            <button id="btn-manual" class="btn btn-outline-primary" disabled>重新识别</button>
            <button id="btn-auto" class="btn btn-outline-primary" disabled>开启自动识别</button>
        </div>
    </div>

    <div class="card">
        <h3 class="font-bold mb-2">识别结果</h3>
        <div id="result-card">
            <div class="alert alert-info">等待识别...</div>
        </div>

        <hr style="margin:1rem 0;border-color:var(--border);">

        <div class="flex justify-between items-center mb-1">
            <h4 class="font-bold">今日签到记录</h4>
            <span id="checked-count" class="text-sm text-muted"></span>
        </div>
        <div style="overflow-x:auto;">
            <table class="table">
                <thead>
                    <tr>
                        <th>学号</th>
                        <th>姓名</th>
                        <th>时间</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="today-log"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/liveness.js"></script>
<script src="/static/js/attendance.js"></script>
{% endblock %}
